



<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Library — Scale Computing Marketing Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --sc-blue: #2572b9;
  --sc-dark: #113859;
  --sc-green: #42b649;
  --sc-purple: #9c2e91;

  --bg: #f7f4ec;
  --panel: #ffffff;
  --panel-2: #fbf8ef;
  --line: #e6dfc9;
  --line-2: #d4ccb1;
  --ink: #1a1c14;
  --ink-2: #595744;
  --ink-3: #8a866d;
  --accent: #DAA520;
  --accent-2: #b8861a;
  --accent-soft: rgba(218,165,32,0.10);

  --r: 10px;
  --sh: 0 2px 8px rgba(17,56,89,.05);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

.app-shell { display: flex; min-height: 100vh; align-items: stretch; }
.main-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--line);
  padding: 18px 12px 24px;
  position: sticky;
  top: 0;
  align-self: flex-start;
  height: 100vh;
  overflow-y: auto;
  z-index: 50;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 8px 18px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 14px;
}
.sidebar-brand img { height: 36px; width: auto; }
.sidebar-brand .stack { display: flex; flex-direction: column; line-height: 1.1; min-width: 0; }
.sidebar-brand .name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 1.4px;
  color: var(--ink);
  font-weight: 400;
  white-space: nowrap;
}
.sidebar-brand .sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  text-transform: uppercase;
  margin-top: 3px;
}

.nav-group { margin-top: 14px; }
.nav-group-header {
  display: flex;
  align-items: center;
  padding: 4px 10px;
  cursor: pointer;
  user-select: none;
  border-radius: 4px;
}
.nav-group-header:hover { background: var(--panel-2); }
.nav-group-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  text-transform: uppercase;
  flex: 1;
}
.nav-group-chevron {
  width: 11px; height: 11px;
  color: var(--ink-3);
  transition: transform 0.18s;
}
.nav-group.open .nav-group-chevron { transform: rotate(90deg); }
.nav-group-items { display: none; margin-top: 4px; }
.nav-group.open .nav-group-items { display: block; }

.nav-item {
  appearance: none;
  border: 0;
  background: transparent;
  width: 100%;
  text-align: left;
  padding: 9px 10px;
  border-radius: 7px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
  display: flex;
  align-items: center;
  gap: 9px;
  cursor: pointer;
  position: relative;
  margin-bottom: 2px;
  text-decoration: none;
}
.nav-item:hover { background: var(--panel-2); color: var(--ink); }
.nav-item.active {
  background: var(--accent-soft);
  color: var(--ink);
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.nav-icon {
  width: 16px; height: 16px;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center; justify-content: center;
  color: var(--ink-3);
}
.nav-icon svg { width: 16px; height: 16px; stroke-width: 1.8; }
.nav-item:hover .nav-icon, .nav-item.active .nav-icon { color: var(--accent-2); }
.nav-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-badge {
  margin-left: auto;
  background: var(--panel-2);
  color: var(--ink-3);
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 999px;
  letter-spacing: 0.04em;
  border: 1px solid var(--line);
  flex-shrink: 0;
}
.nav-item.active .nav-badge {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ===== HEADER ===== */
.hdr {
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  padding: 12px 28px;
  min-height: 56px;
  display: flex;
  align-items: center;
}
.hdr h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--ink-3);
  font-weight: 500;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.hdr h1 .bc-group {
  color: var(--ink-3);
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
}
.hdr h1 a.bc-group:hover { color: var(--accent-2); }
.hdr h1 .bc-sep { color: var(--ink-3); font-weight: 400; opacity: 0.55; margin: 0 2px; }
.hdr h1 .bc-leaf { color: var(--ink); font-weight: 700; }

/* ===== HERO ===== */
.hero {
  background: var(--panel-2);
  border-bottom: 1px solid var(--line);
  padding: 28px 28px 24px;
}
.hero-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  color: var(--ink-3);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.hero h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 2px;
  color: var(--ink);
  font-weight: 400;
  line-height: 1.1;
}
.hero h2 strong { font-weight: 400; color: var(--accent-2); }
.hero-meta {
  margin-top: 8px;
  color: var(--ink-3);
  font-size: 13px;
  font-family: 'Manrope', sans-serif;
}
.hero-meta span, .hero-meta strong { color: var(--ink-2); }
.hero-meta strong { color: var(--ink); font-weight: 600; }

/* Back button row (campaign detail only) */
.back-row {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1px solid var(--line);
  padding: 6px 12px;
  border-radius: 999px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}
.back-link:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--ink);
}
.back-link svg { width: 12px; height: 12px; }

/* ===== CONTENT ===== */
.page { padding: 28px 32px; }

.search-row { margin-bottom: 24px; }
.search-wrap { position: relative; max-width: 360px; }
.search-wrap input {
  width: 100%;
  padding: 9px 14px 9px 38px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--panel);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--ink);
}
.search-wrap input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.search-wrap svg {
  position: absolute;
  left: 13px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--ink-3);
}

/* In-campaign email search */
.detail-search { position: relative; max-width: 420px; margin: 0 0 20px 0; }
.detail-search input {
  width: 100%;
  padding: 9px 14px 9px 38px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--panel);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--ink);
}
.detail-search input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.detail-search-icon {
  position: absolute;
  left: 13px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--ink-3);
  pointer-events: none;
}
.detail-search-icon svg { width: 16px; height: 16px; display: block; }

/* Deep-link focus highlight */
.email-card-focus {
  animation: cardFocusPulse 2.6s ease-out 1;
}
@keyframes cardFocusPulse {
  0%   { box-shadow: 0 0 0 0 rgba(218,165,32,0.55); border-color: var(--accent); }
  15%  { box-shadow: 0 0 0 5px rgba(218,165,32,0.30); border-color: var(--accent); }
  100% { box-shadow: var(--sh); border-color: var(--line); }
}

.view-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.15em;
  color: var(--ink-3);
  text-transform: uppercase;
  margin: 0 0 14px 0;
}

/* Share URL hint */
/* ===== CAMPAIGN LIST CARDS (no expansion, click to navigate) ===== */
.campaign {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 12px;
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: var(--sh);
  cursor: pointer;
  transition: border-color 0.15s, transform 0.12s;
  text-decoration: none;
  color: inherit;
  display: block;
}
.campaign:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}
.campaign-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 22px;
}
.campaign-icon {
  width: 48px; height: 48px;
  border-radius: 10px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.campaign-icon svg { width: 22px; height: 22px; color: var(--ink-2); }
.campaign-body { flex: 1; min-width: 0; }
.campaign-kind {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  color: var(--ink-3);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.campaign-title {
  font-family: 'Manrope', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  letter-spacing: -0.01em;
}
.campaign-count {
  background: var(--panel-2);
  color: var(--ink-2);
  padding: 4px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.campaign-arrow {
  width: 22px; height: 22px;
  color: var(--ink-3);
  flex-shrink: 0;
}
.campaign:hover .campaign-arrow { color: var(--accent-2); }

/* ===== EMAIL CARDS GRID (campaign detail view) ===== */
.email-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.email-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--sh);
}
.email-card-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
}
.email-icon {
  width: 38px; height: 38px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.email-icon svg { width: 18px; height: 18px; }
.icon-blue { background: rgba(37,114,185,0.10); color: var(--sc-blue); }
.icon-purple { background: rgba(156,46,145,0.10); color: var(--sc-purple); }
.icon-green { background: rgba(66,182,73,0.10); color: var(--sc-green); }
.email-body { flex: 1; min-width: 0; }
.email-kind {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 1.4px;
  color: var(--ink-3);
  text-transform: uppercase;
  margin-bottom: 3px;
}
.email-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}

.email-actions {
  display: flex;
  gap: 8px;
  margin-top: auto;
  border-top: 1px solid var(--line);
  padding-top: 12px;
}
.btn {
  flex: 1;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 7px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.btn:hover { background: var(--accent-soft); border-color: var(--accent); }
.btn svg { width: 12px; height: 12px; }
.btn.copied { background: rgba(66,182,73,0.15); border-color: var(--sc-green); color: #2a7e30; }

.empty-hint {
  background: var(--panel);
  border: 1px dashed var(--line-2);
  border-radius: 10px;
  padding: 32px;
  text-align: center;
  color: var(--ink-2);
  font-size: 14px;
}

/* ===== MODAL ===== */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(26, 28, 20, 0.55);
  display: none;
  align-items: flex-start; justify-content: center;
  padding: 40px 20px;
  z-index: 100;
  overflow-y: auto;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--panel);
  border-radius: 12px;
  width: 100%; max-width: 800px;
  max-height: calc(100vh - 80px);
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  background: var(--panel-2);
  gap: 12px;
}
.modal-title-wrap { flex: 1; min-width: 0; }
.modal-title {
  font-family: 'Manrope', sans-serif;
  font-size: 14px; font-weight: 700;
  color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.modal-subject {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 500;
  color: var(--ink-2);
  margin-top: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.modal-actions { display: flex; gap: 8px; flex-shrink: 0; }
.modal-close {
  background: transparent; border: none; cursor: pointer;
  color: var(--ink-2); padding: 4px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { color: var(--ink); }
.modal-body {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: #f2f2f2;
  padding: 24px;
  min-height: 0;
}
.modal-frame-wrap {
  width: 720px; max-width: 100%;
  margin: 0 auto;
  background: #f2f2f2;
  border-radius: 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  overflow: hidden;
}
.modal-frame-wrap iframe {
  width: 100%; min-width: 320px;
  height: 400px;
  border: none; display: block;
  background: #f2f2f2;
}

@media (max-width: 900px) {
  .app-shell { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--line); }
  .page { padding: 24px 20px; }
  .hdr, .hero { padding-left: 20px; padding-right: 20px; }
  .hero h2 { font-size: 28px; }
}
</style>
</head>

  function decodeEmail(id) {
    const b64 = EMAIL_SOURCES[id];
    if (!b64) return '';
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }

          sourceId: "platform-2026-roadmap"
        },
        {
          id: "platform-2026-taco-bell",
          kind: "Customer Story",
          title: "Taco Bell Sessions",
          subject: "How Taco Bell® Scaled Innovation Without Complexity",
          icon: "blue",
          sourceId: "platform-2026-taco-bell"
        },
        {
          id: "platform-2026-security",
          kind: "Security",
          title: "Security Sessions",
          subject: "The New Security Perimeter: Insights and Blueprint from Platform//2026",
          icon: "blue",
          sourceId: "platform-2026-security"
        }
      ]
    },
    {
      id: "q2-2026-tradeshows",
      title: "Q2-2026 Tradeshows",
      kind: "Tradeshow Post-Event",
      year: "2026",
      emails: [
        {
          id: "q2-2026-tradeshows-nclgisa",
          kind: "Tradeshow Post-Event",
          title: "NCLGISA Spring Symposium",
          subject: "Great to see you at the NCLGISA Spring Symposium!",
          icon: "green",
          sourceId: "q2-2026-tradeshows-nclgisa"
        },
        {
          id: "q2-2026-tradeshows-eplus-transform",
          kind: "Tradeshow Post-Event",
          title: "ePlus Transform Summit",
          subject: "Great meeting you at ePlus Transform",
          icon: "green",
          sourceId: "q2-2026-tradeshows-eplus-transform"
        }
      ]
    }
  ];

  const ICONS = {
    email: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
    calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
    folder: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',
    eye: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
    copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
    arrow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>',
    search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
    link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>'
  };

  let detailCampaign = null, detailFocusEmailId = null;

  let currentView = { type: 'all', value: null };

  function getEmailById(id) {
    for (const c of CAMPAIGNS) for (const e of c.emails) if (e.id === id) return e;
    return null;
  }

  function getCampaignById(id) {
    return CAMPAIGNS.find(c => c.id === id);
  }

  function updateCounts() {
    let y2026 = 0;
    CAMPAIGNS.forEach(c => {
      if (c.year === '2026') y2026 += c.emails.length;
    });
    document.getElementById('count-2026').textContent = y2026;
  }

  function buildCampaignNav() {
    const container = document.getElementById('campaignNav');
    container.innerHTML = CAMPAIGNS.map(c => `
      <div class="nav-item" data-campaign-link="${c.id}" data-campaign="${c.id}" role="button" tabindex="0">
        <span class="nav-icon">${ICONS.folder}</span>
        <span class="nav-label">${c.title}</span>
        <span class="nav-badge">${c.emails.length}</span>
      </div>
    `).join('');
  }

  // ===== ROUTING =====
  function parseHash() {
    const hash = window.location.hash.replace(/^#\/?/, '');
    if (!hash) return { route: 'home' };
    const parts = hash.split('/');
    if (parts[0] === 'campaign' && parts[1]) {
      return { route: 'campaign', id: decodeURIComponent(parts[1]), emailId: parts[2] ? decodeURIComponent(parts[2]) : null };
    }
    if (parts[0] === 'year' && parts[1]) {
      return { route: 'year', year: parts[1] };
    }
    return { route: 'home' };
  }

  function navigate(hash) {
    if (window.location.hash === hash) {
      handleRoute();
    } else {
      window.location.hash = hash;
    }
  }

  function handleRoute() {
    const r = parseHash();
    if (r.route === 'campaign') {
      const c = getCampaignById(r.id);
      if (!c) { navigate(''); return; }
      showCampaignDetail(c, r.emailId);
    } else if (r.route === 'year') {
      currentView = { type: 'year', value: r.year };
      showHome();
    } else {
      currentView = { type: 'all', value: null };
      showHome();
    }
  }

  function showHome() {
    document.getElementById('homeView').style.display = '';
    document.getElementById('detailView').style.display = 'none';

    // Reset header to library view
    document.getElementById('breadcrumb').innerHTML = `
      <span class="bc-group">Channels</span>
      <span class="bc-sep">/</span>
      <span class="bc-leaf">Email Library</span>
    `;
    document.getElementById('heroLabel').textContent = 'Marketing Operations';
    document.getElementById('heroTitle').innerHTML = '<strong>Email</strong> Library';
    document.getElementById('heroMeta').innerHTML = 'Click a campaign to view its emails &middot; <strong>Preview</strong> opens the rendered email &middot; <strong>Copy HTML</strong> pulls the code for Pardot';

    // Update sidebar active state
    document.querySelectorAll('.sidebar .nav-item').forEach(n => n.classList.remove('active'));
    if (currentView.type === 'year') {
      const el = document.querySelector(`.sidebar .nav-item[data-view="year"][data-value="${currentView.value}"]`);
      if (el) el.classList.add('active');
    }

    // Collapse By Campaign group when returning to home (unless a year filter is active)
    document.getElementById('navGroup-campaign').classList.remove('open');

    // View label
    let label = 'All campaigns';
    if (currentView.type === 'year') label = `Campaigns with emails from ${currentView.value}`;
    document.getElementById('viewLabel').textContent = label;

    renderCampaigns();
  }

  function showCampaignDetail(campaign, focusEmailId) {
    document.getElementById('homeView').style.display = 'none';
    document.getElementById('detailView').style.display = '';
    detailFocusEmailId = focusEmailId || null;

    // Breadcrumb (Email Library is now a clickable span)
    document.getElementById('breadcrumb').innerHTML = `
      <span class="bc-group">Channels</span>
      <span class="bc-sep">/</span>
      <span class="bc-group" id="bcLibrary" role="button" tabindex="0" style="cursor:pointer;">Email Library</span>
      <span class="bc-sep">/</span>
      <span class="bc-leaf">${campaign.title}</span>
    `;
    document.getElementById('bcLibrary').addEventListener('click', () => navigate(''));
    document.getElementById('bcLibrary').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navigate(''); }
    });

    // Hero block
    document.getElementById('heroLabel').textContent = campaign.kind;
    document.getElementById('heroTitle').textContent = campaign.title;
    document.getElementById('heroMeta').innerHTML = `${campaign.emails.length} email${campaign.emails.length !== 1 ? 's' : ''} in this campaign &middot; <strong>Preview</strong> opens the rendered email &middot; <strong>Copy HTML</strong> pulls the code for Pardot`;

    // Update sidebar active state
    document.querySelectorAll('.sidebar .nav-item').forEach(n => n.classList.remove('active'));
    const navEl = document.querySelector(`.sidebar .nav-item[data-campaign="${campaign.id}"]`);
    if (navEl) navEl.classList.add('active');
    // Auto-open the By Campaign group
    document.getElementById('navGroup-campaign').classList.add('open');

    // Email cards (with in-campaign search)
    detailCampaign = campaign;
    document.getElementById('emailsContainer').innerHTML = `
      <div class="detail-search">
        <span class="detail-search-icon">${ICONS.search}</span>
        <input type="text" id="emailSearchInput" placeholder="Search emails in this campaign by title, subject, or kind…" autocomplete="off" />
      </div>
      <div class="email-grid" id="emailGrid"></div>
    `;
    const emailSearch = document.getElementById('emailSearchInput');
    emailSearch.addEventListener('input', () => renderEmailCards(campaign, emailSearch.value));
    renderEmailCards(campaign, '');

    // Deep-link focus: scroll to + highlight the card, then open its preview
    if (focusEmailId && getEmailById(focusEmailId)) {
      const card = document.getElementById('emailCard-' + focusEmailId);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.classList.add('email-card-focus');
        setTimeout(() => card.classList.remove('email-card-focus'), 2600);
      }
      openPreview(focusEmailId);
    }
  }

  function renderEmailCards(campaign, search) {
    const q = (search || '').toLowerCase().trim();
    const list = campaign.emails.filter(e => {
      if (!q) return true;
      return (e.title + ' ' + e.subject + ' ' + e.kind).toLowerCase().includes(q);
    });
    const grid = document.getElementById('emailGrid');
    if (!grid) return;
    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-hint">No emails match your search.</div>';
      return;
    }
    grid.innerHTML = list.map(emailCardHTML).join('');
    grid.querySelectorAll('.btn-preview').forEach(btn => {
      btn.addEventListener('click', () => openPreview(btn.dataset.id));
    });
    grid.querySelectorAll('.btn-copy').forEach(btn => {
      btn.addEventListener('click', () => copyHTML(btn.dataset.id, btn));
    });
    grid.querySelectorAll('.btn-link').forEach(btn => {
      btn.addEventListener('click', () => {
        const url = window.location.origin + window.location.pathname + '#/campaign/' + detailCampaign.id + '/' + btn.dataset.id;
        copyText(url, btn);
      });
    });
  }

  function emailCardHTML(email) {
    return `
      <div class="email-card" id="emailCard-${email.id}">
        <div class="email-card-top">
          <div class="email-icon icon-${email.icon}">${ICONS.email}</div>
          <div class="email-body">
            <div class="email-kind">${email.kind}</div>
            <div class="email-title">${email.title}</div>
          </div>
        </div>
        <div class="email-actions">
          <button class="btn btn-preview" data-id="${email.id}">${ICONS.eye} Preview</button>
          <button class="btn btn-copy" data-id="${email.id}">${ICONS.copy} Copy HTML</button>
          <button class="btn btn-link" data-id="${email.id}" title="Copy a direct review link to this email">${ICONS.link} Copy link</button>
        </div>
      </div>
    `;
  }

  function campaignCardHTML(c) {
    return `
      <div class="campaign" data-campaign-link="${c.id}" role="button" tabindex="0">
        <div class="campaign-header">
          <div class="campaign-icon">${ICONS.calendar}</div>
          <div class="campaign-body">
            <div class="campaign-kind">${c.kind}</div>
            <div class="campaign-title">${c.title}</div>
          </div>
          <span class="campaign-count">${c.emails.length} EMAIL${c.emails.length !== 1 ? 'S' : ''}</span>
          <span class="campaign-arrow">${ICONS.arrow}</span>
        </div>
      </div>
    `;
  }

  function renderCampaigns() {
    const container = document.getElementById('campaignsContainer');
    const search = document.getElementById('searchInput').value.toLowerCase().trim();

    const filtered = CAMPAIGNS.filter(c => {
      if (currentView.type === 'year' && c.year !== currentView.value) return false;
      if (search) {
        const haystack = (c.title + ' ' + c.kind + ' ' + c.emails.map(e => e.title + ' ' + e.subject).join(' ')).toLowerCase();
        return haystack.includes(search);
      }
      return true;
    });

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-hint">No campaigns match your filters.</div>';
      return;
    }

    container.innerHTML = filtered.map(campaignCardHTML).join('');
  }

  function openPreview(id) {
    const email = getEmailById(id);
    if (!email) return;
    document.getElementById('modalTitle').textContent = email.title;
    document.getElementById('modalSubject').textContent = 'Subject: ' + email.subject;
    const frame = document.getElementById('modalFrame');
    frame.style.height = '400px';
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open();
    doc.write(decodeEmail(email.sourceId));
    doc.close();
    document.getElementById('modalCopyBtn').dataset.id = id;
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';

    const resize = () => {
      try {
        const h = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight);
        if (h > 100) frame.style.height = (h + 40) + 'px';
      } catch (e) {}
    };
    [100, 400, 900, 1800].forEach(t => setTimeout(resize, t));
    try {
      const imgs = doc.images;
      for (let i = 0; i < imgs.length; i++) {
        if (!imgs[i].complete) imgs[i].addEventListener('load', resize);
      }
    } catch (e) {}
  }
  function closePreview() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }
  function copyHTML(id, btn) {
    const html = decodeEmail(id);
    if (!html) { alert('No HTML found.'); return; }
    const finish = () => {
      const original = btn.innerHTML;
      btn.innerHTML = ICONS.check + ' Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(html).then(finish).catch(() => fallbackCopy(html, finish));
    } else fallbackCopy(html, finish);
  }
  function copyText(text, btn) {
    const finish = () => {
      const original = btn.innerHTML;
      btn.innerHTML = ICONS.check + ' Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(finish).catch(() => fallbackCopy(text, finish));
    } else fallbackCopy(text, finish);
  }
  function fallbackCopy(text, onSuccess) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); onSuccess(); }
    catch (e) { alert('Copy failed.'); }
    document.body.removeChild(ta);
  }

  document.getElementById('modalClose').addEventListener('click', closePreview);
  document.getElementById('modal').addEventListener('click', (e) => { if (e.target.id === 'modal') closePreview(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePreview(); });
  document.getElementById('modalCopyBtn').addEventListener('click', (e) => {
    const id = e.currentTarget.dataset.id;
    if (id) copyHTML(id, e.currentTarget);
  });
  document.getElementById('searchInput').addEventListener('input', renderCampaigns);

  document.getElementById('backLink').addEventListener('click', (e) => {
    e.preventDefault();
    navigate('');
  });

  document.querySelectorAll('.nav-group-header').forEach(header => {
    header.addEventListener('click', () => header.parentElement.classList.toggle('open'));
  });

  // Wire up Year nav items (they update currentView and navigate home)
  document.querySelectorAll('.sidebar .nav-item[data-view="year"]').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      navigate('#/year/' + item.dataset.value);
    });
  });

  // Delegated handler for all campaign navigation (cards + sidebar items)
  // Uses JS navigation instead of <a href> to avoid Claude's external-link dialog
  document.body.addEventListener('click', (e) => {
    const trigger = e.target.closest('[data-campaign-link]');
    if (trigger) {
      e.preventDefault();
      navigate('#/campaign/' + trigger.dataset.campaignLink);
    }
  });
  // Keyboard support for the same elements
  document.body.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const trigger = e.target.closest('[data-campaign-link]');
    if (trigger) {
      e.preventDefault();
      navigate('#/campaign/' + trigger.dataset.campaignLink);
    }
  });

  // Hashchange listener for browser back/forward
  window.addEventListener('hashchange', handleRoute);

  buildCampaignNav();
  updateCounts();
  handleRoute();
</script>

</body>
</html>
