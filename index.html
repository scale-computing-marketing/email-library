




<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Library — Scale Computing Marketing Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,500;9..144,0,600;9..144,1,400;9..144,1,500&display=swap" rel="stylesheet">
<style>
:root {
  --sc-blue: #2572b9;
  --sc-dark: #113859;
  --sc-green: #42b649;
  --sc-purple: #9c2e91;
  --sc-orange: #e8780a;

  --bg: #f4f6f9;
  --panel: #ffffff;
  --panel-2: #f8fafc;
  --line: #e2e8f0;
  --line-2: #cbd5e1;
  --ink: #1a2433;
  --ink-2: #64748b;
  --ink-3: #94a3b8;
  --accent: #2572b9;
  --accent-2: #1d5a91;
  --accent-soft: rgba(37,114,185,0.10);

  --r: 10px;
  --sh: 0 2px 8px rgba(17,56,89,.05);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

.app-shell { display: flex; min-height: 100vh; align-items: stretch; }
.main-col { flex: 1; min-width: 0; display: flex; flex-direction: column;
  background-color: #f4f6f9;
  background-image: radial-gradient(circle at 12% -8%, rgba(110,116,126,.06), transparent 42%),
                    radial-gradient(circle at 95% 4%, rgba(110,116,126,.045), transparent 40%);
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--line);
  padding: 18px 12px 24px;
  position: sticky;
  top: 0;
  align-self: flex-start;
  height: 100vh;
  overflow-y: auto;
  z-index: 50;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 8px 18px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 14px;
}
.sidebar-brand img { height: 36px; width: auto; }
.sidebar-brand .stack { display: flex; flex-direction: column; line-height: 1.1; min-width: 0; }
.sidebar-brand .name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 1.4px;
  color: var(--ink);
  font-weight: 400;
  white-space: nowrap;
}
.sidebar-brand .sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  text-transform: uppercase;
  margin-top: 3px;
}

.nav-group { margin-top: 14px; }
.nav-group-header {
  display: flex;
  align-items: center;
  padding: 4px 10px;
  cursor: pointer;
  user-select: none;
  border-radius: 4px;
}
.nav-group-header:hover { background: var(--panel-2); }
.nav-group-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  text-transform: uppercase;
  flex: 1;
}
.nav-group-chevron {
  width: 11px; height: 11px;
  color: var(--ink-3);
  transition: transform 0.18s;
}
.nav-group.open .nav-group-chevron { transform: rotate(90deg); }
.nav-group-items { display: none; margin-top: 4px; }
.nav-group.open .nav-group-items { display: block; }

.nav-item {
  appearance: none;
  border: 0;
  background: transparent;
  width: 100%;
  text-align: left;
  padding: 9px 10px;
  border-radius: 7px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
  display: flex;
  align-items: center;
  gap: 9px;
  cursor: pointer;
  position: relative;
  margin-bottom: 2px;
  text-decoration: none;
}
.nav-item:hover { background: var(--panel-2); color: var(--ink); }
.nav-item.active {
  background: var(--accent-soft);
  color: var(--ink);
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.nav-icon {
  width: 16px; height: 16px;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center; justify-content: center;
  color: var(--ink-3);
}
.nav-icon svg { width: 16px; height: 16px; stroke-width: 1.8; }
.nav-item:hover .nav-icon, .nav-item.active .nav-icon { color: var(--accent-2); }
.nav-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-badge {
  margin-left: auto;
  background: var(--panel-2);
  color: var(--ink-3);
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 999px;
  letter-spacing: 0.04em;
  border: 1px solid var(--line);
  flex-shrink: 0;
}
.nav-item.active .nav-badge {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ===== HEADER ===== */
.hdr {
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  padding: 12px 28px;
  min-height: 56px;
  display: flex;
  align-items: center;
}
.hdr h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--ink-3);
  font-weight: 500;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.hdr h1 .bc-group {
  color: var(--ink-3);
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
}
.hdr h1 a.bc-group:hover { color: var(--accent-2); }
.hdr h1 .bc-sep { color: var(--ink-3); font-weight: 400; opacity: 0.55; margin: 0 2px; }
.hdr h1 .bc-leaf { color: var(--ink); font-weight: 700; }

/* ===== HERO — editorial masthead (duplicated from dashboard governance pages) ===== */
.hero {
  position: relative;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 38px 28px 36px;
  background: transparent;
}
.hero::after {
  content: "";
  position: absolute;
  left: 28px;
  right: 28px;
  bottom: 0;
  border-bottom: 1px solid #e3ddd0;
}
.hero-label {
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 1.3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.hero h2 {
  font-family: 'DM Sans', sans-serif;
  font-size: 26px;
  line-height: 1.15;
  font-weight: 300;
  font-style: normal;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 6px;
}
.hero h2 em,
.hero h2 strong { font-style: italic; font-weight: 400; color: var(--sc-dark); }
.hero-meta {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  line-height: 1.5;
  max-width: 70ch;
  margin: 0;
  color: var(--ink-2);
  font-weight: 400;
}
.hero-meta:empty { display: none; }
.hero-meta span { color: var(--ink-2); }
.hero-meta strong { color: var(--ink); font-weight: 600; }

/* Back button row (campaign detail only) */
.back-row {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1px solid var(--line);
  padding: 6px 12px;
  border-radius: 999px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}
.back-link:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--ink);
}
.back-link svg { width: 12px; height: 12px; }

/* ===== CONTENT ===== */
.page { width: 100%; max-width: 1200px; margin: 0 auto; padding: 24px 28px 40px; }

.search-row { margin-bottom: 24px; }
.search-wrap { position: relative; max-width: 360px; }
.search-wrap input {
  width: 100%;
  padding: 9px 14px 9px 38px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--panel);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--ink);
}
.search-wrap input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.search-wrap svg {
  position: absolute;
  left: 13px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--ink-3);
}

/* ===== TAG FILTER ===== */
.filter-bar {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.tag-filter { position: relative; }
.tag-filter-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 9px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.15s;
}
.tag-filter-btn:hover { border-color: var(--accent); color: var(--ink); }
.tag-filter-btn svg { width: 15px; height: 15px; }
.tag-filter-btn .tf-chevron { transition: transform 0.18s; }
.tag-filter.open .tag-filter-btn .tf-chevron { transform: rotate(180deg); }
.tag-filter-count {
  background: var(--accent);
  color: #fff;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 999px;
  min-width: 20px;
  text-align: center;
}
.tag-filter-panel {
  display: none;
  position: absolute;
  z-index: 60;
  top: calc(100% + 6px);
  left: 0;
  width: 320px;
  max-width: 90vw;
  background: var(--panel);
  border: 1px solid var(--line-2);
  border-radius: var(--r);
  box-shadow: 0 8px 28px rgba(17,56,89,.14);
  overflow: hidden;
}
.tag-filter.open .tag-filter-panel { display: block; }
.tag-filter-search {
  position: relative;
  padding: 12px 12px 8px;
  border-bottom: 1px solid var(--line);
}
.tag-filter-search input {
  width: 100%;
  padding: 8px 12px 8px 32px;
  border-radius: 7px;
  border: 1px solid var(--line);
  background: var(--panel-2);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--ink);
}
.tag-filter-search input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.tag-filter-search svg {
  position: absolute;
  left: 22px; top: 21px;
  width: 14px; height: 14px;
  color: var(--ink-3);
  pointer-events: none;
}
.tag-filter-actions {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
}
.tag-filter-action {
  flex: 1;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 6px 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.15s;
}
.tag-filter-action:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--ink); }
.tag-filter-list {
  max-height: 280px;
  overflow-y: auto;
  padding: 6px;
}
.tag-filter-list::-webkit-scrollbar { width: 6px; }
.tag-filter-list::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }
.tag-option {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 9px;
  border-radius: 6px;
  cursor: pointer;
  user-select: none;
}
.tag-option:hover { background: var(--panel-2); }
.tag-option input { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
.tag-option-label {
  flex: 1;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tag-option-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-3);
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 1px 7px;
  flex-shrink: 0;
}
.tag-filter-empty {
  padding: 18px 12px;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--ink-3);
}
.active-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.active-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--accent-2);
  background: var(--accent-soft);
  border: 1px solid var(--accent);
  border-radius: 999px;
  padding: 3px 6px 3px 10px;
}
.active-tag button {
  border: 0;
  background: transparent;
  color: var(--accent-2);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  padding: 0;
  line-height: 0;
}
.active-tag button svg { width: 11px; height: 11px; }
.active-tag-clear {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-3);
  background: transparent;
  border: 0;
  cursor: pointer;
  text-decoration: underline;
  padding: 3px 4px;
}
.active-tag-clear:hover { color: var(--ink); }

/* In-campaign email search */
.detail-search { position: relative; max-width: 420px; margin: 0 0 20px 0; }
.detail-search input {
  width: 100%;
  padding: 9px 14px 9px 38px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--panel);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--ink);
}
.detail-search input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.detail-search-icon {
  position: absolute;
  left: 13px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--ink-3);
  pointer-events: none;
}
.detail-search-icon svg { width: 16px; height: 16px; display: block; }

/* Deep-link focus highlight */
.email-card-focus {
  animation: cardFocusPulse 2.6s ease-out 1;
}
@keyframes cardFocusPulse {
  0%   { box-shadow: 0 0 0 0 rgba(37,114,185,0.55); border-color: var(--accent); }
  15%  { box-shadow: 0 0 0 5px rgba(37,114,185,0.30); border-color: var(--accent); }
  100% { box-shadow: var(--sh); border-color: var(--line); }
}

.view-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.15em;
  color: var(--ink-3);
  text-transform: uppercase;
  margin: 0 0 14px 0;
}

/* Share URL hint */
/* ===== CAMPAIGN LIST CARDS (no expansion, click to navigate) ===== */
.campaign {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 12px;
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: var(--sh);
  cursor: pointer;
  transition: border-color 0.15s, transform 0.12s;
  text-decoration: none;
  color: inherit;
  display: block;
}
.campaign:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}
.campaign-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 22px;
}
.campaign-icon {
  width: 48px; height: 48px;
  border-radius: 10px;
  background: var(--panel-2);
  border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.campaign-icon svg { width: 22px; height: 22px; color: var(--ink-2); }
.campaign-body { flex: 1; min-width: 0; }
.campaign-kind {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  color: var(--ink-3);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.campaign-title {
  font-family: 'Manrope', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  letter-spacing: -0.01em;
}
.campaign-count {
  background: var(--panel-2);
  color: var(--ink-2);
  padding: 4px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.campaign-arrow {
  width: 22px; height: 22px;
  color: var(--ink-3);
  flex-shrink: 0;
}
.campaign:hover .campaign-arrow { color: var(--accent-2); }

/* ===== EMAIL CARDS GRID (campaign detail view) ===== */
.email-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

/* ===== Email table (campaign + tag-filtered views) ===== */
.email-table-wrap {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 12px;
  box-shadow: var(--sh);
  overflow-x: auto;
}
.email-table { width: 100%; min-width: 660px; border-collapse: collapse; table-layout: fixed; }
.email-table th {
  text-align: left;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink-2);
  padding: 12px 16px;
  border-bottom: 2px solid var(--line);
  background: var(--panel-2);
}
.email-table td {
  padding: 13px 16px;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
  vertical-align: middle;
}
.email-table tbody tr:last-child td { border-bottom: 0; }
.email-table tbody tr { cursor: pointer; transition: background 0.12s; }
.email-table tbody tr:hover { background: var(--panel-2); }
.col-email { width: 34%; }
.col-aud { width: 19%; }
.col-status { width: 15%; }
.col-date { width: 16%; white-space: nowrap; }
.col-actions { width: 16%; }
.row-email { display: flex; align-items: center; gap: 12px; min-width: 0; }
.row-email .email-icon {
  width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.row-email .email-icon svg { width: 17px; height: 17px; }
.row-email-text { min-width: 0; }
.row-kind {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 500;
  letter-spacing: 1.3px; text-transform: uppercase;
  color: var(--ink-3); margin-bottom: 2px;
}
.row-title {
  font-size: 14px; font-weight: 600; color: var(--sc-dark);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.t-mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); }
.cell-badges { display: flex; flex-wrap: wrap; gap: 6px; }
.row-actions { display: flex; gap: 6px; }
.ib {
  width: 30px; height: 28px; padding: 0;
  border: 1px solid var(--line); border-radius: 7px;
  background: var(--panel); color: var(--ink-2);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: all 0.12s;
}
.ib svg { width: 15px; height: 15px; }
.ib:hover { border-color: var(--accent); color: var(--accent); }
.email-row.email-card-focus { animation: rowFocusPulse 2.6s ease-out 1; }
@keyframes rowFocusPulse {
  0%  { background: rgba(37,114,185,0.18); }
  100% { background: transparent; }
}
.email-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--sh);
}
.email-card-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
}
.email-icon {
  width: 38px; height: 38px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.email-icon svg { width: 18px; height: 18px; }
.icon-blue { background: rgba(37,114,185,0.10); color: var(--sc-blue); }
.icon-purple { background: rgba(156,46,145,0.10); color: var(--sc-purple); }
.icon-green { background: rgba(66,182,73,0.10); color: var(--sc-green); }
.icon-orange { background: rgba(232,120,10,0.12); color: var(--sc-orange); }
.email-body { flex: 1; min-width: 0; }
.email-kind {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 1.4px;
  color: var(--ink-3);
  text-transform: uppercase;
  margin-bottom: 3px;
}
.email-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}

.email-meta { margin-bottom: 14px; }
.email-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.email-tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--ink-2);
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 2px 9px;
  white-space: nowrap;
}
.email-tag.tag-matched {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent-2);
}
.email-tag-sep {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--ink-3);
  align-self: center;
  margin: 0 1px;
}
.email-date {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--ink-3);
}
.email-date svg { width: 11px; height: 11px; stroke-width: 2; }

/* ===== Send status + pre/post phase badges ===== */
.email-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.status-badge, .phase-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 999px;
  border: 1px solid transparent;
  white-space: nowrap;
}
.status-badge svg { width: 11px; height: 11px; stroke-width: 2.4; }
.status-sent     { background: rgba(66,182,73,0.12);  color: #2e8a34;        border-color: rgba(66,182,73,0.30); }
.status-today    { background: rgba(232,120,10,0.14); color: var(--sc-orange); border-color: rgba(232,120,10,0.34); }
.status-upcoming { background: rgba(37,114,185,0.12); color: var(--sc-blue);   border-color: rgba(37,114,185,0.30); }
.status-nodate   { background: var(--panel-2);        color: var(--ink-3);     border-color: var(--line); }

.phase-badge { background: var(--panel); border-color: var(--line-2); }
.phase-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.phase-pre  { color: var(--sc-blue);   border-color: rgba(37,114,185,0.35); }
.phase-post { color: var(--sc-purple); border-color: rgba(156,46,145,0.32); }
.phase-pre  .phase-dot { background: var(--sc-blue); }
.phase-post .phase-dot { background: var(--sc-purple); }

/* Status edge accent on the whole card — quick scan of sent vs still-to-send */
.email-card.edge-sent     { border-left: 3px solid rgba(66,182,73,0.55); }
.email-card.edge-today    { border-left: 3px solid var(--sc-orange); }
.email-card.edge-upcoming { border-left: 3px solid var(--sc-blue); }
.email-card.edge-nodate   { border-left: 3px solid var(--line-2); }

.email-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: auto;
  border-top: 1px solid var(--line);
  padding-top: 12px;
}
.btn {
  flex: 1 1 calc(50% - 4px);
  white-space: nowrap;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 7px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.btn:hover { background: var(--accent-soft); border-color: var(--accent); }
.btn svg { width: 12px; height: 12px; }
.btn.copied { background: rgba(66,182,73,0.15); border-color: var(--sc-green); color: #2a7e30; }

.empty-hint {
  background: var(--panel);
  border: 1px dashed var(--line-2);
  border-radius: 10px;
  padding: 32px;
  text-align: center;
  color: var(--ink-2);
  font-size: 14px;
}

/* ===== MODAL ===== */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(26, 28, 20, 0.55);
  display: none;
  align-items: flex-start; justify-content: center;
  padding: 40px 20px;
  z-index: 100;
  overflow-y: auto;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--panel);
  border-radius: 12px;
  width: 100%; max-width: 800px;
  max-height: calc(100vh - 80px);
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  background: var(--panel-2);
  gap: 12px;
}
.modal-title-wrap { flex: 1; min-width: 0; }
.modal-title {
  font-family: 'Manrope', sans-serif;
  font-size: 14px; font-weight: 700;
  color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.modal-kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 500;
  letter-spacing: 1.4px; text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.modal-actions { display: flex; gap: 8px; flex-shrink: 0; }
.modal-close {
  background: transparent; border: none; cursor: pointer;
  color: var(--ink-2); padding: 4px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { color: var(--ink); }
.modal-body {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: #f2f2f2;
  padding: 24px;
  min-height: 0;
}
.modal-frame-wrap {
  width: 720px; max-width: 100%;
  margin: 0 auto;
  background: #f2f2f2;
  border-radius: 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  overflow: hidden;
}
.modal-frame-wrap iframe {
  width: 100%; min-width: 320px;
  height: 400px;
  border: none; display: block;
  background: #f2f2f2;
}
.modal-meta {
  width: 720px; max-width: 100%;
  margin: 0 auto 20px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--r);
  box-shadow: var(--sh);
  padding: 18px 20px;
}
.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px 28px;
}
.meta-row { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
.meta-row.full { grid-column: 1 / -1; }
.meta-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-3);
}
.meta-value {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  color: var(--ink); line-height: 1.45;
  word-break: break-word;
}
.meta-value.preview { color: var(--ink-2); font-style: italic; font-weight: 400; }
.meta-value.muted { color: var(--ink-3); font-style: italic; font-weight: 400; }
.meta-tags { display: flex; flex-wrap: wrap; gap: 6px; }

@media (max-width: 900px) {
  .app-shell { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--line); }
  .page { padding: 24px 20px; }
  .hdr, .hero { padding-left: 20px; padding-right: 20px; }
  .hero::after { left: 20px; right: 20px; }
  .hero h2 { font-size: 23px; }
}
</style>
</head>

<script>
  // Email HTML now lives as individual files in /emails/<sourceId>.html
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  function emailFileUrl(sourceId) { return "emails/" + sourceId + ".html"; }
  async function fetchEmailHTML(sourceId) {
    const res = await fetch(emailFileUrl(sourceId));
    if (!res.ok) throw new Error("Could not load " + sourceId);
    return res.text();
  }

  let CAMPAIGNS = [];   // populated from manifest.json at load

  const ICONS = {

    x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
  };

  let detailCampaign = null, detailFocusEmailId = null;
  const selectedTags = new Set();

  let currentView = { type: 'all', value: null };

  function getEmailById(id) {
    for (const c of CAMPAIGNS) for (const e of c.emails) if (e.id === id) return e;
    return null;
  }

  function getCampaignById(id) {
    return CAMPAIGNS.find(c => c.id === id);
  }

  function getCampaignByEmailId(id) {
    return CAMPAIGNS.find(c => c.emails.some(e => e.id === id)) || null;
  }

  // ===== Send-date helpers: parsing, ordering, sent/scheduled status, pre/post phase =====

  // Parse a free-form send-date string to a local-midnight timestamp, or NaN if not a concrete date.
  // Handles ISO (2026-06-15, 2026/6/5, 2026-06), US (06/15/2026), and natural language (June 15, 2026).
  function parseSendDate(raw) {
    if (!raw) return NaN;
    const s = String(raw).trim();
    let m = s.match(/(\d{4})[-/](\d{1,2})(?:[-/](\d{1,2}))?/);
    if (m) return new Date(+m[1], +m[2] - 1, m[3] ? +m[3] : 1).getTime();
    m = s.match(/(\d{1,2})[/](\d{1,2})[/](\d{4})/);
    if (m) return new Date(+m[3], +m[1] - 1, +m[2]).getTime();
    const t = Date.parse(s);
    return isNaN(t) ? NaN : t;
  }

  // Ordering key: concrete dates use their timestamp; year-only/quarter strings fall back to that
  // year; anything undated sinks to the bottom. Used to sort most-recent / future first.
  function sendSortKey(email) {
    const ts = parseSendDate(email.sendDate);
    if (!isNaN(ts)) return ts;
    const ym = String(email.sendDate || '').match(/(20\d{2})/);
    if (ym) return new Date(+ym[1], 0, 1).getTime() - 1;
    return -Infinity;
  }
  function bySendDateDesc(a, b) { return sendSortKey(b) - sendSortKey(a); }

  function todayMidnight() { const d = new Date(); d.setHours(0, 0, 0, 0); return d.getTime(); }

  // 'sent' | 'today' | 'upcoming' | 'nodate' — only concrete dates yield a sent/upcoming verdict.
  function sendStatus(email) {
    const ts = parseSendDate(email.sendDate);
    if (isNaN(ts)) return 'nodate';
    const today = todayMidnight();
    if (ts < today) return 'sent';
    if (ts === today) return 'today';
    return 'upcoming';
  }

  // 'pre' | 'post' | null — derived from the email kind (explicit, then common synonyms).
  function eventPhase(email) {
    const k = (email.kind || '').toLowerCase();
    if (/\bpost[\s-]?event\b|\bpost\b/.test(k)) return 'post';
    if (/\bpre[\s-]?event\b|\bpre\b/.test(k)) return 'pre';
    if (/\b(replay|recap|round[\s-]?up|on[\s-]?demand|follow[\s-]?up|thank\s?you|highlights|wrap[\s-]?up)\b/.test(k)) return 'post';
    if (/\b(save the date|invite|invitation|registration|rsvp|countdown|reminder)\b/.test(k)) return 'pre';
    return null;
  }

  const STATUS_META = {
    sent:     { label: 'Sent',          icon: 'check' },
    today:    { label: 'Sending today', icon: 'clock' },
    upcoming: { label: 'Scheduled',     icon: 'clock' },
    nodate:   { label: 'Date TBD',      icon: 'calendar' }
  };

  function emailBadgesHTML(email) {
    const st = sendStatus(email);
    const meta = STATUS_META[st];
    let html = `<span class="status-badge status-${st}">${ICONS[meta.icon]}${meta.label}</span>`;
    const phase = eventPhase(email);
    if (phase) {
      html += `<span class="phase-badge phase-${phase}"><span class="phase-dot"></span>${phase === 'pre' ? 'Pre-event' : 'Post-event'}</span>`;
    }
    return `<div class="email-badges">${html}</div>`;
  }

  // Unique tags across the library (respecting an active year filter), with email counts.
  function getAllTags() {
    const counts = {};
    CAMPAIGNS.forEach(c => {
      if (currentView.type === 'year' && c.year !== currentView.value) return;
      c.emails.forEach(e => (e.tags || []).forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
    });
    return Object.keys(counts).sort().map(t => ({ tag: t, count: counts[t] }));
  }

  function emailMatchesSelectedTags(email) {
    if (selectedTags.size === 0) return true;
    const tags = email.tags || [];
    // OR logic: show emails that carry ANY of the selected tags.
    for (const t of selectedTags) if (tags.includes(t)) return true;
    return false;
  }

  function getFilteredEmails(textSearch) {
    const q = (textSearch || '').toLowerCase().trim();
    const out = [];
    CAMPAIGNS.forEach(c => {
      if (currentView.type === 'year' && c.year !== currentView.value) return;
      c.emails.forEach(e => {
        if (!emailMatchesSelectedTags(e)) return;
        if (q) {
          const hay = (e.title + ' ' + e.subject + ' ' + e.kind + ' ' + (e.tags || []).join(' ')).toLowerCase();
          if (!hay.includes(q)) return;
        }
        out.push({ email: e, campaign: c });
      });
    });
    return out;
  }

  function updateCounts() {
    let y2026 = 0;
    CAMPAIGNS.forEach(c => {
      if (c.year === '2026') y2026 += c.emails.length;
    });
    document.getElementById('count-2026').textContent = y2026;
  }

  function buildCampaignNav() {
    const container = document.getElementById('campaignNav');
    container.innerHTML = CAMPAIGNS.map(c => `
      <div class="nav-item" data-campaign-link="${c.id}" data-campaign="${c.id}" role="button" tabindex="0">
        <span class="nav-icon">${ICONS.folder}</span>
        <span class="nav-label">${c.title}</span>
        <span class="nav-badge">${c.emails.length}</span>
      </div>
    `).join('');
  }

  // ===== ROUTING =====
  function parseHash() {
    const hash = window.location.hash.replace(/^#\/?/, '');
    if (!hash) return { route: 'home' };
    const parts = hash.split('/');
    if (parts[0] === 'campaign' && parts[1]) {
      return { route: 'campaign', id: decodeURIComponent(parts[1]), emailId: parts[2] ? decodeURIComponent(parts[2]) : null };
    }
    if (parts[0] === 'year' && parts[1]) {
      return { route: 'year', year: parts[1] };
    }
    return { route: 'home' };
  }

  function navigate(hash) {
    if (window.location.hash === hash) {
      handleRoute();
    } else {
      window.location.hash = hash;
    }
  }

  function handleRoute() {
    const r = parseHash();
    if (r.route === 'campaign') {
      const c = getCampaignById(r.id);
      if (!c) { navigate(''); return; }
      showCampaignDetail(c, r.emailId);
    } else if (r.route === 'year') {
      currentView = { type: 'year', value: r.year };
      showHome();
    } else {
      currentView = { type: 'all', value: null };
      showHome();
    }
  }

  function showHome() {
    document.getElementById('homeView').style.display = '';
    document.getElementById('detailView').style.display = 'none';

    // Reset header to library view
    document.getElementById('breadcrumb').innerHTML = `
      <span class="bc-group">Channels</span>
      <span class="bc-sep">/</span>
      <span class="bc-leaf">Email Library</span>
    `;
    document.getElementById('heroLabel').textContent = 'Marketing Operations';
    document.getElementById('heroTitle').innerHTML = 'Email Library <em>\u2014 campaigns &amp; emails</em>';
    document.getElementById('heroMeta').innerHTML = 'Click a campaign to view its emails &middot; <strong>Preview</strong> opens the rendered email &middot; <strong>Copy HTML</strong> pulls the code for Pardot';

    // Update sidebar active state
    document.querySelectorAll('.sidebar .nav-item').forEach(n => n.classList.remove('active'));
    if (currentView.type === 'year') {
      const el = document.querySelector(`.sidebar .nav-item[data-view="year"][data-value="${currentView.value}"]`);
      if (el) el.classList.add('active');
    }

    // Collapse By Campaign group when returning to home (unless a year filter is active)
    document.getElementById('navGroup-campaign').classList.remove('open');

    // View label
    let label = 'All campaigns';
    if (currentView.type === 'year') label = `Campaigns with emails from ${currentView.value}`;
    document.getElementById('viewLabel').textContent = label;

    renderCampaigns();
  }

  function showCampaignDetail(campaign, focusEmailId) {
    document.getElementById('homeView').style.display = 'none';
    document.getElementById('detailView').style.display = '';
    detailFocusEmailId = focusEmailId || null;

    // Breadcrumb (Email Library is now a clickable span)
    document.getElementById('breadcrumb').innerHTML = `
      <span class="bc-group">Channels</span>
      <span class="bc-sep">/</span>
      <span class="bc-group" id="bcLibrary" role="button" tabindex="0" style="cursor:pointer;">Email Library</span>
      <span class="bc-sep">/</span>
      <span class="bc-leaf">${campaign.title}</span>
    `;
    document.getElementById('bcLibrary').addEventListener('click', () => navigate(''));
    document.getElementById('bcLibrary').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navigate(''); }
    });

    // Hero block
    document.getElementById('heroLabel').textContent = (campaign.year ? campaign.year + ' · ' : '') + campaign.kind;
    document.getElementById('heroTitle').textContent = campaign.title;
    document.getElementById('heroMeta').innerHTML = '';

    // Update sidebar active state
    document.querySelectorAll('.sidebar .nav-item').forEach(n => n.classList.remove('active'));
    const navEl = document.querySelector(`.sidebar .nav-item[data-campaign="${campaign.id}"]`);
    if (navEl) navEl.classList.add('active');
    // Auto-open the By Campaign group
    document.getElementById('navGroup-campaign').classList.add('open');

    // Email cards (with in-campaign search)
    detailCampaign = campaign;
    document.getElementById('emailsContainer').innerHTML = `
      <div class="detail-search">
        <span class="detail-search-icon">${ICONS.search}</span>
        <input type="text" id="emailSearchInput" placeholder="Search emails in this campaign by title, subject, or kind…" autocomplete="off" />
      </div>
      <div id="emailGrid"></div>
    `;
    const emailSearch = document.getElementById('emailSearchInput');
    emailSearch.addEventListener('input', () => renderEmailCards(campaign, emailSearch.value));
    renderEmailCards(campaign, '');

    // Deep-link focus: scroll to + highlight the card, then open its preview
    if (focusEmailId && getEmailById(focusEmailId)) {
      const card = document.getElementById('emailCard-' + focusEmailId);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.classList.add('email-card-focus');
        setTimeout(() => card.classList.remove('email-card-focus'), 2600);
      }
      openPreview(focusEmailId);
    }
  }

  function renderEmailCards(campaign, search) {
    const q = (search || '').toLowerCase().trim();
    const list = campaign.emails.filter(e => {
      if (!q) return true;
      return (e.title + ' ' + e.subject + ' ' + e.kind + ' ' + (e.tags || []).join(' ')).toLowerCase().includes(q);
    });
    list.sort(bySendDateDesc);
    const grid = document.getElementById('emailGrid');
    if (!grid) return;
    if (list.length === 0) {
      grid.innerHTML = '<div class="empty-hint">No emails match your search.</div>';
      return;
    }
    grid.innerHTML = emailTableHTML(list.map(e => emailRowHTML(e, campaign.id)).join(''));
    wireEmailCardButtons(grid);
  }

  // Shared wiring for email card buttons (used by both the detail view and the
  // tag-filtered home view). The link button carries its own campaign id.
  function wireEmailCardButtons(grid) {
    // Whole row opens the preview; clicks on the action buttons are handled below.
    grid.querySelectorAll('.email-row').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('button')) return;
        openPreview(row.dataset.id);
      });
    });
    grid.querySelectorAll('.btn-preview').forEach(btn => {
      btn.addEventListener('click', () => openPreview(btn.dataset.id));
    });
    grid.querySelectorAll('.btn-copy').forEach(btn => {
      btn.addEventListener('click', () => copyHTML(btn.dataset.id, btn));
    });
    grid.querySelectorAll('.btn-code').forEach(btn => {
      btn.addEventListener('click', () => copyCodeRef(btn.dataset.id, btn));
    });
    grid.querySelectorAll('.btn-link').forEach(btn => {
      btn.addEventListener('click', () => {
        const cid = btn.dataset.campaign || (detailCampaign && detailCampaign.id);
        if (!cid) return;
        const url = window.location.origin + window.location.pathname + '#/campaign/' + cid + '/' + btn.dataset.id;
        copyText(url, btn);
      });
    });
  }

  // Status badge(s) for the table's Status column — status, plus pre/post phase when present.
  function statusCellHTML(email) {
    const st = sendStatus(email);
    const meta = STATUS_META[st];
    let html = `<span class="status-badge status-${st}">${ICONS[meta.icon]}${meta.label}</span>`;
    const phase = eventPhase(email);
    if (phase) {
      html += `<span class="phase-badge phase-${phase}"><span class="phase-dot"></span>${phase === 'pre' ? 'Pre-event' : 'Post-event'}</span>`;
    }
    return `<div class="cell-badges">${html}</div>`;
  }

  function emailRowHTML(email, campaignId) {
    const aud = deriveAudience(email.tags);
    return `
      <tr class="email-row" id="emailCard-${email.id}" data-id="${email.id}">
        <td class="col-email">
          <div class="row-email">
            <span class="email-icon icon-${email.icon}">${ICONS.email}</span>
            <div class="row-email-text">
              <div class="row-kind">${esc(email.kind)}</div>
              <div class="row-title">${esc(email.title)}</div>
            </div>
          </div>
        </td>
        <td class="col-aud t-mono">${aud ? esc(aud) : '—'}</td>
        <td class="col-status">${statusCellHTML(email)}</td>
        <td class="col-date t-mono">${email.sendDate ? esc(email.sendDate) : '—'}</td>
        <td class="col-actions">
          <div class="row-actions">
            <button class="ib btn-preview" data-id="${email.id}" title="Preview" aria-label="Preview">${ICONS.eye}</button>
            <button class="ib btn-copy" data-id="${email.id}" title="Copy HTML" aria-label="Copy HTML">${ICONS.copy}</button>
            <button class="ib btn-code" data-id="${email.id}" title="Copy a Claude Code reference for this email" aria-label="Copy for Code">${ICONS.code}</button>
            <button class="ib btn-link" data-id="${email.id}" data-campaign="${campaignId || ''}" title="Copy a direct review link to this email" aria-label="Copy link">${ICONS.link}</button>
          </div>
        </td>
      </tr>
    `;
  }

  function emailTableHTML(rowsHTML) {
    return `
      <div class="email-table-wrap">
        <table class="email-table">
          <thead>
            <tr>
              <th class="col-email">Email</th>
              <th class="col-aud">Audience</th>
              <th class="col-status">Status</th>
              <th class="col-date">Send date</th>
              <th class="col-actions">Actions</th>
            </tr>
          </thead>
          <tbody>${rowsHTML}</tbody>
        </table>
      </div>
    `;
  }

  function campaignCardHTML(c) {
    return `
      <div class="campaign" data-campaign-link="${c.id}" role="button" tabindex="0">
        <div class="campaign-header">
          <div class="campaign-icon">${ICONS.calendar}</div>
          <div class="campaign-body">
            <div class="campaign-kind">${c.kind}</div>
            <div class="campaign-title">${c.title}</div>
          </div>
          <span class="campaign-count">${c.emails.length} EMAIL${c.emails.length !== 1 ? 'S' : ''}</span>
          <span class="campaign-arrow">${ICONS.arrow}</span>
        </div>
      </div>
    `;
  }

  function renderCampaigns() {
    const container = document.getElementById('campaignsContainer');
    const rawSearch = document.getElementById('searchInput').value;
    const search = rawSearch.toLowerCase().trim();
    const label = document.getElementById('viewLabel');

    // When one or more tags are selected, flatten to matching email cards
    // (across campaigns) instead of showing campaign cards.
    if (selectedTags.size > 0) {
      const matches = getFilteredEmails(search);
      matches.sort((a, b) => bySendDateDesc(a.email, b.email));
      label.textContent = matches.length === 1
        ? '1 email matches the selected tags'
        : matches.length + ' emails match the selected tags';
      if (matches.length === 0) {
        container.innerHTML = '<div class="empty-hint">No emails match the selected tags' + (search ? ' and your search.' : '.') + '</div>';
        return;
      }
      container.innerHTML = emailTableHTML(
        matches.map(m => emailRowHTML(m.email, m.campaign.id)).join('')
      );
      wireEmailCardButtons(container);
      return;
    }

    // Default: campaign cards.
    label.textContent = currentView.type === 'year'
      ? 'Campaigns with emails from ' + currentView.value
      : 'All campaigns';

    const filtered = CAMPAIGNS.filter(c => {
      if (currentView.type === 'year' && c.year !== currentView.value) return false;
      if (search) {
        const haystack = (c.title + ' ' + c.kind + ' ' + c.emails.map(e => e.title + ' ' + e.subject + ' ' + (e.tags || []).join(' ')).join(' ')).toLowerCase();
        return haystack.includes(search);
      }
      return true;
    });

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-hint">No campaigns match your filters.</div>';
      return;
    }

    container.innerHTML = filtered.map(campaignCardHTML).join('');
  }

  // ===== Tag filter UI =====
  function renderActiveTags() {
    const wrap = document.getElementById('activeTags');
    const countBadge = document.getElementById('tagFilterCount');
    if (selectedTags.size === 0) {
      wrap.style.display = 'none';
      wrap.innerHTML = '';
      countBadge.style.display = 'none';
      return;
    }
    countBadge.style.display = '';
    countBadge.textContent = selectedTags.size;
    wrap.style.display = 'flex';
    wrap.innerHTML = Array.from(selectedTags).sort().map(t =>
      `<span class="active-tag">${t}<button type="button" data-tag="${t}" aria-label="Remove ${t}">${ICONS.x}</button></span>`
    ).join('') + `<button class="active-tag-clear" id="activeClearAll" type="button">Clear all</button>`;

    wrap.querySelectorAll('.active-tag button[data-tag]').forEach(btn => {
      btn.addEventListener('click', () => toggleTag(btn.dataset.tag, false));
    });
    const clearAll = document.getElementById('activeClearAll');
    if (clearAll) clearAll.addEventListener('click', clearAllTags);
  }

  function renderTagList() {
    const list = document.getElementById('tagFilterList');
    const q = document.getElementById('tagSearchInput').value.toLowerCase().trim();
    const all = getAllTags().filter(t => !q || t.tag.toLowerCase().includes(q));
    if (all.length === 0) {
      list.innerHTML = '<div class="tag-filter-empty">No tags match "' + q + '".</div>';
      return;
    }
    list.innerHTML = all.map(({ tag, count }) => `
      <label class="tag-option">
        <input type="checkbox" data-tag="${tag}" ${selectedTags.has(tag) ? 'checked' : ''} />
        <span class="tag-option-label">${tag}</span>
        <span class="tag-option-count">${count}</span>
      </label>
    `).join('');
    list.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => toggleTag(cb.dataset.tag, cb.checked));
    });
  }

  function toggleTag(tag, on) {
    if (on) selectedTags.add(tag); else selectedTags.delete(tag);
    renderTagList();
    renderActiveTags();
    renderCampaigns();
  }

  function clearAllTags() {
    selectedTags.clear();
    renderTagList();
    renderActiveTags();
    renderCampaigns();
  }

  function selectAllVisibleTags() {
    const q = document.getElementById('tagSearchInput').value.toLowerCase().trim();
    getAllTags().filter(t => !q || t.tag.toLowerCase().includes(q))
      .forEach(t => selectedTags.add(t.tag));
    renderTagList();
    renderActiveTags();
    renderCampaigns();
  }

  function initTagFilter() {
    const filter = document.getElementById('tagFilter');
    const btn = document.getElementById('tagFilterBtn');

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const open = filter.classList.toggle('open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      if (open) {
        renderTagList();
        const ts = document.getElementById('tagSearchInput');
        ts.value = '';
        setTimeout(() => ts.focus(), 0);
        renderTagList();
      }
    });
    // Keep panel open when interacting inside it.
    document.getElementById('tagFilterPanel').addEventListener('click', (e) => e.stopPropagation());
    // Close on outside click.
    document.addEventListener('click', () => {
      filter.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    });

    document.getElementById('tagSearchInput').addEventListener('input', renderTagList);
    document.getElementById('tagSelectAll').addEventListener('click', selectAllVisibleTags);
    document.getElementById('tagClearAll').addEventListener('click', clearAllTags);

    renderTagList();
    renderActiveTags();
  }

  // Turn an audience-* tag into a friendly label, e.g.
  // "audience-end-user-prospect" -> "End User Prospect".
  function deriveAudience(tags) {
    if (!tags || !tags.length) return '';
    const labels = tags
      .filter(t => t.indexOf('audience-') === 0)
      .map(t => t.slice('audience-'.length).split('-')
        .map(w => w ? w.charAt(0).toUpperCase() + w.slice(1) : w).join(' '));
    return labels.join(', ');
  }

  // Pull the inbox preview text from an email's hidden preheader block.
  const preheaderCache = {};
  function extractPreheader(html) {
    try {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const hidden = Array.from(doc.querySelectorAll('[style]')).find(el => {
        const s = (el.getAttribute('style') || '').replace(/\s/g, '');
        return s.indexOf('display:none') !== -1 && s.indexOf('max-height:0') !== -1;
      });
      return hidden ? hidden.textContent.replace(/\s+/g, ' ').trim() : '';
    } catch (e) { return ''; }
  }
  function setPreviewTextCell(sourceId, expectedId) {
    const fill = (text) => {
      const cell = document.getElementById('metaPreviewText');
      // Guard against a slow fetch resolving after the user opened another email.
      if (!cell || cell.dataset.for !== expectedId) return;
      if (text) { cell.textContent = text; cell.className = 'meta-value preview'; }
      else { cell.textContent = 'No preview text in this email.'; cell.className = 'meta-value muted'; }
    };
    if (preheaderCache[sourceId] !== undefined) { fill(preheaderCache[sourceId]); return; }
    fetchEmailHTML(sourceId)
      .then(html => { const t = extractPreheader(html); preheaderCache[sourceId] = t; fill(t); })
      .catch(() => fill(''));
  }

  function renderModalMeta(email) {
    const audience = deriveAudience(email.tags);
    const rows = [];
    rows.push(`<div class="meta-row full"><div class="meta-label">Subject</div><div class="meta-value">${esc(email.subject || '')}</div></div>`);
    rows.push(`<div class="meta-row"><div class="meta-label">Send Date</div><div class="meta-value${email.sendDate ? '' : ' muted'}">${esc(email.sendDate || 'Not scheduled')}</div></div>`);
    rows.push(`<div class="meta-row"><div class="meta-label">Audience</div><div class="meta-value${audience ? '' : ' muted'}">${esc(audience || '—')}</div></div>`);
    rows.push(`<div class="meta-row full"><div class="meta-label">Preview Text</div><div class="meta-value muted" id="metaPreviewText" data-for="${esc(email.id)}">Loading…</div></div>`);
    if (email.tags && email.tags.length) {
      rows.push(`<div class="meta-row full"><div class="meta-label">Tags</div><div class="meta-tags">${
        email.tags.map(t => `<span class="email-tag${selectedTags.has(t) ? ' tag-matched' : ''}">${esc(t)}</span>`).join('')
      }</div></div>`);
    }
    document.getElementById('modalMeta').innerHTML = `<div class="meta-grid">${rows.join('')}</div>`;
    setPreviewTextCell(email.sourceId, email.id);
  }

  function openPreview(id) {
    const email = getEmailById(id);
    if (!email) return;
    document.getElementById('modalKicker').textContent = email.kind || 'Email';
    document.getElementById('modalTitle').textContent = email.title;
    renderModalMeta(email);
    const frame = document.getElementById('modalFrame');
    frame.style.height = '400px';
    document.getElementById('modalCopyBtn').dataset.id = id;
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';

    const resize = () => {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        const h = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight);
        if (h > 100) frame.style.height = (h + 40) + 'px';
        const imgs = doc.images;
        for (let i = 0; i < imgs.length; i++) {
          if (!imgs[i].complete) imgs[i].addEventListener('load', resize);
        }
      } catch (e) {}
    };
    frame.onload = () => { [100, 400, 900, 1800].forEach(t => setTimeout(resize, t)); };
    frame.src = emailFileUrl(email.sourceId);
  }
  function closePreview() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }
  function copyHTML(id, btn) {
    const email = getEmailById(id);
    const sourceId = email ? email.sourceId : id;
    const finish = () => {
      const original = btn.innerHTML;
      btn.innerHTML = ICONS.check + ' Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 1800);
    };
    fetchEmailHTML(sourceId).then(emailHtml => {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(emailHtml).then(finish).catch(() => fallbackCopy(emailHtml, finish));
      } else fallbackCopy(emailHtml, finish);
    }).catch(() => alert('Could not load the email HTML to copy.'));
  }
  function copyText(text, btn) {
    const finish = () => {
      const original = btn.innerHTML;
      btn.innerHTML = ICONS.check + ' Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(finish).catch(() => fallbackCopy(text, finish));
    } else fallbackCopy(text, finish);
  }
  function copyCodeRef(id, btn) {
    const email = getEmailById(id);
    const camp = getCampaignByEmailId(id);
    const path = 'emails/' + (email ? email.sourceId : id) + '.html';
    const title = email ? email.title : id;
    const campTitle = camp ? camp.title : '';
    const ref = campTitle
      ? `In ${path} (${campTitle}: "${title}"), `
      : `In ${path} ("${title}"), `;
    copyText(ref, btn);
  }
  function fallbackCopy(text, onSuccess) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); onSuccess(); }
    catch (e) { alert('Copy failed.'); }
    document.body.removeChild(ta);
  }

  document.getElementById('modalClose').addEventListener('click', closePreview);
  document.getElementById('modal').addEventListener('click', (e) => { if (e.target.id === 'modal') closePreview(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePreview(); });
  document.getElementById('modalCopyBtn').addEventListener('click', (e) => {
    const id = e.currentTarget.dataset.id;
    if (id) copyHTML(id, e.currentTarget);
  });
  document.getElementById('searchInput').addEventListener('input', renderCampaigns);

  document.getElementById('backLink').addEventListener('click', (e) => {
    e.preventDefault();
    navigate('');
  });

  document.querySelectorAll('.nav-group-header').forEach(header => {
    header.addEventListener('click', () => header.parentElement.classList.toggle('open'));
  });

  // Wire up Year nav items (they update currentView and navigate home)
  document.querySelectorAll('.sidebar .nav-item[data-view="year"]').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      navigate('#/year/' + item.dataset.value);
    });
  });

  // Delegated handler for all campaign navigation (cards + sidebar items)
  // Uses JS navigation instead of <a href> to avoid Claude's external-link dialog
  document.body.addEventListener('click', (e) => {
    const trigger = e.target.closest('[data-campaign-link]');
    if (trigger) {
      e.preventDefault();
      navigate('#/campaign/' + trigger.dataset.campaignLink);
    }
  });
  // Keyboard support for the same elements
  document.body.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const trigger = e.target.closest('[data-campaign-link]');
    if (trigger) {
      e.preventDefault();
      navigate('#/campaign/' + trigger.dataset.campaignLink);
    }
  });

  // Hashchange listener for browser back/forward
  window.addEventListener('hashchange', handleRoute);

  async function init() {
    try {
      const res = await fetch('manifest.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('manifest.json failed to load');
      const data = await res.json();
      CAMPAIGNS = data.campaigns || [];
    } catch (e) {
      document.getElementById('campaignsContainer').innerHTML =
        '<div class="empty-hint">Could not load manifest.json. If you are opening this file directly from your computer, view it through GitHub Pages (or a local web server) instead — browsers block file loads otherwise.</div>';
      return;
    }
    buildCampaignNav();
    updateCounts();
    initTagFilter();
    handleRoute();
  }
  init();
</script>

</body>
</html>
